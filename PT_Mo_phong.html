<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Mô phỏng duyệt đồ thị</title>
  </head>
  <body>
    <header class="header">
      <div class="brand">graph theory</div>
      <nav class="sidebar">
        <a href="index.html" class="myButton">Trang chủ</a>
        <a href="Mo_phong.html" class="myButton">Mô phỏng</a>
        <div class="dropdown">
          <button class="myButton dropdown-toggle">Thuật toán ▾</button>
          <ul class="dropdown-menu">
            <li><a href="BFS.html">Code BFS</a></li>
            <li><a href="DFS.html">Code DFS</a></li>
          </ul>
        </div>
      </nav>
    </header>
  </body>
</html>

    <div class="test_box">
      <div class="scan">
        <label for="algo-select">Chọn thuật toán</label>
        <select id="algo-select" class="my-dropdown">
          <option value="bfs">Duyệt BFS (Chiều rộng)</option>
          <option value="dfs">Duyệt DFS (Chiều sâu)</option>
          <option value="dijkstra">Thuật toán Dijkstra (Đường đi ngắn nhất)</option>
        </select>
        <hr />
        <br />
        <label for="graph-select">Hướng đồ thị</label>
        <select id="algo-select" class="my-dropdown">
          <option value="bfs">Có hướng</option>
          <option value="dfs">Vô hướng</option>
        </select>
        <hr />
        <br />
        <label for="node-number">Nhập số đỉnh</label>
        <input type="number" name="" id="" />
        <hr />
        <br />
        <label for="edge-list">Danh sách cung (u v):</label>
        <small>Mỗi dòng là một cung, ví dụ: 1 2</small>
        <textarea
          id="edge-list"
          class="my-textarea"
          placeholder="1 2&#10;1 3&#10;2 4"
          rows="4"
        ></textarea>
        <hr />
        <br />
        <label for="node-start">Chọn đỉnh bắt đầu</label>
        <input type="text" name="" id="" />
        <hr />
        <br />
        <input type="button" class="myButton" value="RUN" />
      </div>

      <div class="run">
        <div class="graph">
          <div class="conclusion">
            <p>Thứ tự duyệt:</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
