<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Mô phỏng duyệt đồ thị</title>
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="brand">Graph theory</div>
      <nav class="sidebar">
        <a href="index.html" class="myButton">Trang chủ</a>
        <a href="Mo_phong.html" class="myButton">Mô phỏng</a>
        <div class="dropdown">
          <button class="myButton dropdown-toggle">Thuật toán ▾</button>
          <ul class="dropdown-menu">
            <li><a href="BFS.html">Code BFS</a></li>
            <li><a href="DFS.html">Code DFS</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- MAIN -->
    <div class="test_box">
      <!-- PANEL TRÁI -->
      <div class="scan">
        <label>Chọn thuật toán</label>
        <select id="algo-select" class="my-dropdown">
          <option value="bfs">Duyệt BFS (Chiều rộng)</option>
          <option value="dfs">Duyệt DFS (Chiều sâu)</option>
        </select>

        <hr />
        <br />

        <label>Hướng đồ thị</label>
        <select id="graph-type" class="my-dropdown">
          <option value="directed">Có hướng</option>
          <option value="undirected">Vô hướng</option>
        </select>

        <hr />
        <br />

        <label>Nhập số đỉnh</label>
        <input type="number" id="node-count" />

        <hr />
        <br />

        <label>Danh sách cung (u v)</label>
        <small>Mỗi dòng 1 cạnh</small>
        <textarea
          id="edge-list"
          class="my-textarea"
          placeholder="Ví dụ:&#10;1 2&#10;1 3&#10;2 4"
          rows="5"
        ></textarea>

        <hr />
        <br />

        <label>Đỉnh bắt đầu</label>
        <input type="number" id="start-node" />

        <hr />
        <br />

        <button id="run-btn" class="myButton">RUN</button>
      </div>

      <!-- PANEL PHẢI -->
      <div class="run">
        <div class="graph" id="graph">
          <!-- SVG VẼ CẠNH -->
          <svg id="edges" width="100%" height="100%">
            <defs>
              <marker
                id="arrowhead"
                markerWidth="10"
                markerHeight="7"
                refX="10"
                refY="3.5"
                orient="auto"
              >
                <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
              </marker>
            </defs>
          </svg>

          <!-- KẾT QUẢ -->
          <div class="conclusion">
            <p>Thứ tự duyệt:</p>
            <span id="result"></span>
          </div>
        </div>
      </div>
    </div>

    <script src="script_mophong.js"></script>
  </body>
</html>
